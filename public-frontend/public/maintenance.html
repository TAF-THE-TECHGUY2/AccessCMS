    <style>
      :root {
        --bg: #0b0b0c;
        --bg-2: #161616;
        --gold: #b3a17a;
        --gold-dim: #9e8f6d;
        --text: #f5f3ee;
        --muted: #a7a499;
        --line: rgba(179, 161, 122, 0.22);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            1200px 600px at 50% -10%,
            rgba(179, 161, 122, 0.10),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        padding: 32px;
        overflow: hidden;
      }

      .wrap {
        position: relative;
        width: 100%;
        max-width: 620px;
        text-align: center;
        z-index: 1;
      }

      .logo {
        width: 132px;
        height: auto;
        margin: 0 auto 34px;
        display: block;
        filter: drop-shadow(0 8px 28px rgba(0, 0, 0, 0.55));
        animation: rise 900ms ease-out both;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 22px;
        animation: rise 900ms 80ms ease-out both;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 500;
        font-size: clamp(30px, 6vw, 46px);
        line-height: 1.12;
        letter-spacing: 0.01em;
        margin-bottom: 20px;
        animation: rise 900ms 140ms ease-out both;
      }

      h1 .accent {
        color: var(--gold);
        font-style: italic;
      }

      .lead {
        font-size: clamp(15px, 2.4vw, 17px);
        line-height: 1.7;
        color: var(--muted);
        max-width: 460px;
        margin: 0 auto 36px;
        animation: rise 900ms 200ms ease-out both;
      }

      .divider {
        position: relative;
        width: 220px;
        height: 1px;
        margin: 0 auto 34px;
        background: var(--line);
        overflow: hidden;
        animation: rise 900ms 260ms ease-out both;
      }

      .divider::after {
        content: "";
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        animation: shimmer 2.8s ease-in-out infinite;
      }

      .socials {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 30px;
        animation: rise 900ms 320ms ease-out both;
      }

      .socials a {
        width: 44px;
        height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        color: var(--gold);
        transition: color 0.25s ease, border-color 0.25s ease,
          background 0.25s ease, transform 0.25s ease;
      }

      .socials a:hover {
        color: var(--bg);
        background: var(--gold);
        border-color: var(--gold);
        transform: translateY(-2px);
      }

      .socials svg {
        width: 19px;
        height: 19px;
      }

      .footer {
        font-size: 12px;
        letter-spacing: 0.05em;
        color: rgba(167, 164, 153, 0.6);
        animation: rise 900ms 380ms ease-out both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes shimmer {
        0% {
          left: -40%;
        }
        100% {
          left: 110%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::after {
          animation: none !important;
        }
      }
    </style>
  </head>
