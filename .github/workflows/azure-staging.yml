name: Azure Static Web Apps - Staging

# Deploys the `staging` branch to a STABLE named pre-production environment
# called "staging". Reviewers get a persistent URL of the form:
#   https://gentle-water-099e3771e-staging.<region>.azurestaticapps.net
# Production (the `main` branch) is unaffected by this workflow.

on:
  push:
    branches:
      - staging

jobs:
  build_and_deploy_staging:
    runs-on: ubuntu-latest
    name: Build and Deploy to Staging
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_WATER_099E3771E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./public-frontend"
          api_location: ""
          output_location: "build"
          app_build_command: "CI=false npm run build"
          deployment_environment: "staging"
